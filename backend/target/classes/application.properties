server.port=8085
spring.application.name=practica10-bully

# ID de este proceso (1,2,3) - cambiar al iniciar en cada máquina/terminal
bully.process-id=1

# IPs de los 3 procesos (en red local, todos en el mismo puerto 8085)
bully.peers[0].id=1
bully.peers[0].ip=192.168.1.10
bully.peers[0].puerto=8085

bully.peers[1].id=2
bully.peers[1].ip=192.168.1.11
bully.peers[1].puerto=8085

bully.peers[2].id=3
bully.peers[2].ip=192.168.1.12
bully.peers[2].puerto=8085

# Coordinador inicial (el de mayor ID)
bully.coordinador-inicial=3

# Timeout en ms para esperar respuestas OK durante elección
bully.timeout-ms=2000
